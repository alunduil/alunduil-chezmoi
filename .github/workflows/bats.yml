name: Bats

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel main so each commit completes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
          # Override defaults of true; the suite doesn't load helper libs.
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false
          # bats-action curls api.github.com; auth raises the anonymous rate limit.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: bats --recursive dot_local dot_claude script
