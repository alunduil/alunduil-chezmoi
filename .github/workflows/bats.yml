name: Bats

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel main so each commit completes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        id: setup-bats
        with:
          # Versions stay aligned with script/install/bats-libs (the local
          # path); Renovate bumps both together. assert defaults to 2.1.0, so
          # pin it explicitly. detik/file stay unused.
          support-install: true
          support-version: "0.3.0"
          assert-install: true
          assert-version: "2.2.4"
          detik-install: false
          file-install: false
          # bats-action curls api.github.com; auth raises the anonymous rate limit.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: bats test/
        env:
          # The action installs to /usr/lib/bats-* but does not export the path;
          # its lib-path output points BATS_LIB_PATH at them for test_helper.
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
