name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        env:
          ZELLIJ_VERSION: v0.44.1
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          mkdir -p ~/.config/chezmoi
          age-keygen -o ~/.config/chezmoi/key.txt 2>/dev/null
          arch="x86_64-unknown-linux-musl"
          base="https://github.com/zellij-org/zellij/releases/download/${ZELLIJ_VERSION}"
          curl -fsSL -o /tmp/zellij.tar.gz "$base/zellij-${arch}.tar.gz"
          tar -xzf /tmp/zellij.tar.gz -C /tmp
          sudo install -m 0755 /tmp/zellij /usr/local/bin/zellij

      - name: Zellij config
        run: script/check-zellij-config

      - name: Plugin URLs
        run: script/check-plugin-urls

      - name: Chezmoi apply
        run: script/check-chezmoi-apply

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Bats
        run: bats test/
