name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Set up test age key
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          mkdir -p ~/.config/chezmoi
          age-keygen -o ~/.config/chezmoi/key.txt 2>/dev/null

      - name: Shellcheck
        run: |
          for f in run_once_before_*.sh.tmpl; do
            chezmoi execute-template --source="$GITHUB_WORKSPACE" \
              < "$f" > /tmp/bootstrap.sh
            shellcheck /tmp/bootstrap.sh
          done
          shellcheck dot_local/bin/executable_gh
          shellcheck dot_claude/hooks/executable_pr-draft-guard.sh

      - name: chezmoi dry-run
        run: chezmoi apply --dry-run --verbose --source="$GITHUB_WORKSPACE"

      - name: KDL syntax
        run: |
          pip install --quiet kdl-py
          python3 -c "
          import kdl, sys
          for path in sys.argv[1:]:
              with open(path) as f:
                  kdl.parse(f.read())
              print(f'{path}: ok')
          " dot_config/zellij/config.kdl dot_config/zellij/layouts/pair.kdl

      - name: JSON syntax
        run: jq empty dot_claude/settings.json

      - name: Markdown links
        run: npx --yes markdown-link-check README.md
