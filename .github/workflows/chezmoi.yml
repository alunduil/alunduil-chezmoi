name: Chezmoi

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel main so each commit completes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install chezmoi
        env:
          CHEZMOI_VERSION: "v2.70.5"
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin -t "$CHEZMOI_VERSION"

      - name: Install age
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq age

      - name: Generate ephemeral age key
        run: |
          mkdir -p ~/.config/chezmoi
          age-keygen -o ~/.config/chezmoi/key.txt

      - name: Check apply
        run: script/checks/chezmoi-apply

      - name: Check script templates render
        run: script/checks/chezmoi-template

      - name: Check settings permission grammar
        run: script/checks/settings-permissions
