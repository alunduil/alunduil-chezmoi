name: Lychee

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel main so each commit completes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ hashFiles('README.md', 'dot_config/zellij/config.kdl') }}
          restore-keys: lychee-cache-
      - uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: '--cache --retry-wait-time 5 README.md dot_config/zellij/config.kdl'
