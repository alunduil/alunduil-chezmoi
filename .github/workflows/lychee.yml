name: Lychee

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel main so each commit completes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Internal cross-references must resolve on disk. --offline skips every
  # network request, so external rot — checked weekly in lychee-external.yml —
  # never blocks a PR. No cache step: --offline verifies nothing worth caching.
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: '--offline --no-progress **/*.md **/*.kdl'
          fail: true
