name: Systemd

# Verifies the systemd user units with `systemd-analyze verify`. verify
# resolves each unit's ExecStart against the calling user's %h, so it installs
# every binary the units reference first (the observability stack pushes this
# to a ~400 MB install). Kept apart from observability.yml so the units keep
# their checker once that stack is gone.
on:
  push:
    branches: [main]
    paths: &paths
      - 'dot_config/systemd/user/**'
      - 'etc/systemd/system/**'
      - 'dot_local/bin/executable_zellijstat'
      - 'dot_local/bin/executable_git-poi-all'
      - 'dot_local/bin/executable_git-worktree-poi'
      - 'dot_local/bin/executable_dev-cache-gc'
      - 'script/install/prometheus'
      - 'script/install/alloy'
      - 'script/install/loki'
      - 'script/install/tempo'
      - 'script/install/grafana'
      - 'script/checks/systemd-units'
      - '.github/workflows/systemd.yml'
  pull_request:
    paths: *paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel main so each commit completes.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install referenced binaries
        run: |
          mkdir -p "$HOME/.local/bin"
          for t in prometheus alloy loki tempo grafana; do
            script/install/"$t" --bin-dir "$HOME/.local/bin"
          done
          for s in zellijstat git-poi-all git-worktree-poi dev-cache-gc; do
            install -m 0755 "dot_local/bin/executable_$s" "$HOME/.local/bin/$s"
          done

      - name: Verify systemd units
        run: script/checks/systemd-units
