name: Weekly

on:
  schedule:
    # Mondays at 06:00 Europe/London; the timezone field handles BST/GMT.
    - cron: '0 6 * * 1'
      timezone: Europe/London
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Ref-less group so a manual dispatch and the schedule can't run
  # concurrently and race on the shared report issue; cancel rather than
  # queue so a fresh dispatch supersedes an in-flight run.
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # External URLs rot independently of our diffs, so checking them per-PR
  # produces flaky failures. Verify them weekly and open an issue on breakage
  # rather than blocking the line. Never fails the run (fail: false).
  external-links:
    name: Check external links
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .lycheecache
          key: lychee-cache-${{ hashFiles('lychee.toml', '**/*.md', '**/*.kdl') }}
          restore-keys: lychee-cache-

      # Reads lychee.toml from the repo root, so the exclude/retry/fragment
      # settings apply to this run too.
      - name: Check all links
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: '--no-progress **/*.md **/*.kdl'
          fail: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # Reuse the open report if one exists so repeated breakage updates a
      # single issue instead of filing a new one every week.
      - name: Find existing report issue
        if: steps.lychee.outputs.exit_code != 0
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          number=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search 'Link Checker Report in:title' --json number --jq '.[0].number // empty')
          echo "number=${number}" >> "${GITHUB_OUTPUT}"

      - name: Open or update issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          issue-number: ${{ steps.report.outputs.number }}
          labels: documentation
