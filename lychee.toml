cache = true
max_cache_age = "14d"
retry_wait_time = 5

# No include_fragments here: the pinned binary (script/install/lychee) wants a
# string ("full"), while lychee-action's older bundled binary wants a bool, so no
# shared value parses in both. The pre-commit lychee hook enables anchor checking
# via --include-fragments instead.

# GitHub doesn't render #issuecomment-* anchors in the initial DOM,
# so lychee can't verify them even when the comment exists.
exclude = [
  "^https://github\\.com/.*#issuecomment-",
]
