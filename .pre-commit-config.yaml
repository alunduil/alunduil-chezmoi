# .vale/styles/ is vendored by `vale sync`; only config/ (our Project vocab)
# is ours. Keep the vendored packages out of every hook.
exclude: ^\.vale/styles/(?!config/)

repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: (executable_|\.sh\.tmpl$)
        # executable_zellijstat is Python, not shell; the executable_ glob
        # would otherwise hand it to a shell linter.
        exclude: ^dot_local/bin/executable_zellijstat$
        types: [text]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ['-i', '2', '-ci']
        files: (executable_|\.sh\.tmpl$)
        exclude: ^dot_local/bin/executable_zellijstat$
        types: [text]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-json
        # malformed.json is intentionally invalid — a fixture for the
        # pr-draft-guard hook's fail-closed-on-bad-input test.
        exclude: ^dot_claude/hooks/fixtures/pr_draft_guard/malformed\.json$
      - id: check-yaml
        # .tmpl files are Go templates, not valid YAML until chezmoi renders.
        exclude: \.tmpl$
      - id: check-toml
      - id: detect-private-key
      - id: debug-statements
      - id: check-ast
      - id: check-merge-conflict

  # The Python hooks below also lint dot_local/bin/executable_zellijstat. It
  # carries chezmoi's executable_ prefix, so it has no .py suffix and is stored
  # non-executable; identify tags it only as `text`, so the default
  # python-typed matching skips it. Match it by path instead.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [text]
        files: (\.py$|/executable_zellijstat$)
      - id: ruff-format
        types_or: [text]
        files: (\.py$|/executable_zellijstat$)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        types_or: [text]
        files: (\.py$|/executable_zellijstat$)

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/errata-ai/vale
    rev: v3.14.2
    hooks:
      - id: vale
        args: [--output=line, --minAlertLevel=error]
        exclude: ^(CLAUDE\.md|dot_claude/|\.claude/|\.vale/styles/)

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.209.3
    hooks:
      - id: renovate-config-validator
        args: [--strict, --no-global]
