# 16-char hex IDs in listings; 8-char IDs are collision-vulnerable.
keyid-format 0xlong

# Always print fingerprints -- the only identifier safe to compare.
with-fingerprint
with-subkey-fingerprint

# Prefer modern algorithms when *we* encrypt or hash, regardless of the
# recipient's stated preferences (subject to support).
personal-cipher-preferences AES256 AES192 AES
personal-digest-preferences SHA512 SHA384 SHA256

# Use SHA512 when signing key certifications (default is SHA256).
cert-digest-algo SHA512

# Default signing key. Explicit so adding a second key later doesn't
# silently change which one signs.
default-key 8F491CBC32D144341679826AE7E6572EF50D1BC5

# Strengthen passphrase-derivation parameters used to protect the secret
# key on disk. Not retroactive: the existing key keeps its 2021-era s2k
# settings until re-protected via `gpg --edit-key … > passwd`.
s2k-digest-algo SHA512
s2k-cipher-algo AES256
s2k-mode 3
s2k-count 65011712
